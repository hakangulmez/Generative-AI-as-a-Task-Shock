# Three-tier firm universe for cross-sectoral LLM substitution study.
#
# primary_software tier is built from SIC 7370-7379 filter — not listed here.
# This file defines primary_knowledge and placebo tiers via manual curation.
#
# Schema: {ticker, sector, expected_rho, company}
# - expected_rho: used as calibration reference in Phase 6 validation matrix
# - sector: categorical label for heterogeneity analysis

